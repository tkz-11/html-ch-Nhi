<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NQuoc · IT Request v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090F;color:#F9FAFB;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* ── HEADER ── */
.hdr{background:#0D1117;border-bottom:1px solid #1F2937;padding:11px 22px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:40}
.logo{width:30px;height:30px;border-radius:7px;background:#7C3AED;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hdr-t{font-weight:700;font-size:14px}
.hdr-s{font-size:10px;color:#4B5563}

/* ── SCORE BAR ── */
.sbar{background:#0D1117;border-bottom:1px solid #111827;padding:7px 22px;position:sticky;top:52px;z-index:39}
.sbar-row{display:flex;align-items:center;gap:10px}
.sbar-bg{flex:1;height:4px;background:#111827;border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .5s ease,background .3s}
.sbar-pct{font-size:11px;font-weight:700;min-width:32px}
.sbar-lbl{font-size:10px;color:#4B5563}

/* ── TIMELINE ── */
.timeline{background:#0D1117;border-bottom:1px solid #1F2937;padding:12px 22px;position:sticky;top:83px;z-index:38;overflow-x:auto}
.tl-inner{display:flex;align-items:center;min-width:500px}
.tl-step{display:flex;flex-direction:column;align-items:center;position:relative;flex:1}
.tl-step:not(:last-child)::after{content:'';position:absolute;top:14px;left:50%;width:100%;height:2px;z-index:1}
.tl-step.done:not(:last-child)::after{background:#16A34A}
.tl-step.active:not(:last-child)::after{background:linear-gradient(90deg,#7C3AED,#1F2937)}
.tl-step.locked:not(:last-child)::after{background:#1F2937}
.tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;position:relative;z-index:2;flex-shrink:0;transition:all .3s}
.tl-step.done .tl-dot{background:#16A34A;color:#fff;border:2px solid #16A34A}
.tl-step.active .tl-dot{background:#7C3AED;color:#fff;border:2px solid #A78BFA;box-shadow:0 0 0 4px #7C3AED22;animation:pulse-dot 2s infinite}
.tl-step.locked .tl-dot{background:#111827;color:#374151;border:2px solid #1F2937}
.tl-step.error .tl-dot{background:#EF444422;color:#F87171;border:2px solid #EF4444}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 4px #7C3AED22}50%{box-shadow:0 0 0 8px #7C3AED11}}
.tl-label{font-size:10px;margin-top:5px;font-weight:600;text-align:center;line-height:1.3}
.tl-step.done .tl-label{color:#16A34A}
.tl-step.active .tl-label{color:#A78BFA}
.tl-step.locked .tl-label{color:#374151}
.tl-step.error .tl-label{color:#F87171}
.tl-sublabel{font-size:9px;color:#4B5563;text-align:center;margin-top:1px;max-width:80px;line-height:1.2}
.tl-step.done .tl-sublabel{color:#16A34A88}
.tl-step.active .tl-sublabel{color:#7C3AED88}

/* ── MAIN ── */
.main{max-width:720px;margin:0 auto;padding:24px 20px 100px}
.tag{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#4B5563;margin-bottom:7px}
h2{font-size:21px;font-weight:800;line-height:1.25;margin-bottom:5px;letter-spacing:-.4px}
.sub{font-size:12px;color:#9CA3AF;margin-bottom:18px;line-height:1.65}

/* ── STEP TRANSITION ── */
.step-content{animation:fadeSlide .25s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── GATE PANEL ── (eye-tracking: bottom of page, primary CTA zone) ── */
.gate-panel{position:sticky;bottom:0;background:linear-gradient(to top,#07090F 80%,transparent);padding:16px 0 0;margin-top:24px;z-index:20}
.gate-inner{background:#0D1117;border:1px solid #1F2937;border-radius:12px;padding:14px 16px;box-shadow:0 -8px 32px #000000aa}
.gate-title{font-size:10px;font-weight:700;color:#4B5563;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.gate-list{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.gate-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 10px;border-radius:7px;transition:all .2s;cursor:default}
.gate-item.ok{color:#4ADE80;background:#16A34A0D}
.gate-item.missing{color:#FCD34D;background:#EAB3080D;cursor:pointer}
.gate-item.missing:hover{background:#EAB30818}
.gate-item.optional{color:#4B5563;background:transparent}
.gate-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.gate-item.ok .gate-dot{background:#16A34A33;color:#4ADE80}
.gate-item.missing .gate-dot{background:#EAB30833;color:#FCD34D;animation:blink 1.5s infinite}
.gate-item.optional .gate-dot{background:#1F2937;color:#4B5563}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes pop{0%{transform:scale(0.5);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.gate-btn-row{display:flex;gap:8px;align-items:center}
.gate-btn{flex:1;border:none;border-radius:9px;padding:11px 18px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:7px}
.gate-btn.ready{background:#7C3AED;color:#fff}
.gate-btn.ready:hover{background:#6D28D9;transform:translateY(-1px)}
.gate-btn.blocked{background:#111827;color:#4B5563;cursor:not-allowed;border:1px solid #1F2937}
.gate-btn.blocked:hover{background:#1A1A2E}
.gate-back{background:transparent;border:1px solid #1F2937;border-radius:9px;padding:11px 14px;color:#4B5563;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.gate-back:hover{border-color:#374151;color:#9CA3AF}
.missing-count{background:#EAB30822;color:#FCD34D;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}

/* ── TEAM GRID ── */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.tc{background:#111827;border:1px solid #1F2937;border-radius:12px;padding:15px 12px;cursor:pointer;text-align:center;transition:all .17s}
.tc:hover{border-color:#7C3AED;background:#1C1535;transform:translateY(-1px)}
.tc-e{font-size:25px;margin-bottom:6px}
.tc-n{font-size:13px;font-weight:700;margin-bottom:3px}
.tc-d{font-size:10px;color:#4B5563;line-height:1.4}

/* ── REQ LIST ── */
.rl{display:flex;flex-direction:column;gap:6px}
.rc{background:#111827;border:1px solid #1F2937;border-radius:10px;padding:11px 15px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s}
.rc:hover{border-color:#7C3AED;background:#1C1535}

/* ── SEVERITY ── */
.sev-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.sev-card{background:#111827;border:2px solid #1F2937;border-radius:10px;padding:11px 13px;cursor:pointer;transition:all .17s}
.sev-card:hover{transform:translateY(-1px)}
.sev-card.p0.sel{border-color:#EF4444;background:#1a0808}
.sev-card.p1.sel{border-color:#F97316;background:#1a0e06}
.sev-card.p2.sel{border-color:#EAB308;background:#1a1606}
.sev-card.p3.sel{border-color:#16A34A;background:#06160a}
/* required outline when missing */
.sev-card.req-missing{border-color:#EAB30855;animation:req-pulse 2s infinite}
@keyframes req-pulse{0%,100%{border-color:#EAB30855}50%{border-color:#EAB308aa}}
.sev-lbl{font-size:13px;font-weight:800;margin-bottom:2px}
.sev-desc{font-size:10px;color:#9CA3AF;margin-bottom:4px}
.sev-sla{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;display:inline-block}
.p0 .sev-sla{background:#EF444422;color:#F87171}
.p1 .sev-sla{background:#F9731622;color:#FB923C}
.p2 .sev-sla{background:#EAB30822;color:#FCD34D}
.p3 .sev-sla{background:#16A34A22;color:#4ADE80}

/* ── ARCH ── */
.arch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:16px}
.arch-btn{background:#111827;border:1px solid #1F2937;border-radius:8px;padding:9px 10px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;width:100%}
.arch-btn:hover{border-color:#7C3AED}
.arch-btn.sel{border-color:#7C3AED;background:#1C1535}
.arch-btn.req-missing{border-color:#EAB30855;animation:req-pulse 2s infinite}
.arch-icon{font-size:16px;margin-bottom:4px}
.arch-name{font-size:11px;font-weight:700;color:#F9FAFB;margin-bottom:1px}
.arch-desc{font-size:9px;color:#4B5563}

/* ── EXPECTED/ACTUAL ── */
.ea-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ea-box{background:#111827;border:1px solid #1F2937;border-radius:10px;overflow:hidden;transition:border-color .2s}
.ea-box.req-missing{border-color:#EAB30855;animation:req-pulse 2s infinite}
.ea-hdr{padding:7px 11px;font-size:10px;font-weight:700}
.ea-hdr.exp{background:#16A34A18;color:#4ADE80;border-bottom:1px solid #16A34A33}
.ea-hdr.act{background:#EF444418;color:#F87171;border-bottom:1px solid #EF444433}
.ea-box textarea{width:100%;background:transparent;border:none;outline:none;color:#F9FAFB;font-size:12px;padding:9px 11px;font-family:inherit;resize:none;min-height:70px}

/* ── REPRO ── */
.repro-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.repro-btn{background:#111827;border:1px solid #1F2937;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:11px;font-family:inherit;color:#9CA3AF;transition:all .15s}
.repro-btn:hover{border-color:#7C3AED;color:#F9FAFB}
.repro-btn.sel{border-color:#7C3AED;background:#1C1535;color:#A78BFA;font-weight:700}

/* ── CHAT ── */
.chat-bot{display:flex;gap:7px;margin-bottom:10px}
.chat-usr{display:flex;justify-content:flex-end;margin-bottom:10px}
.av{width:23px;height:23px;border-radius:50%;background:#7C3AED;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;color:#fff}
.bb{background:#111827;border:1px solid #1F2937;border-radius:3px 10px 10px 10px;padding:9px 12px;font-size:12px;max-width:90%;line-height:1.5}
.bb.on{border-color:#7C3AED88}
.bu{background:#1C1535;border:1px solid #7C3AED33;border-radius:10px 10px 10px 3px;padding:9px 12px;font-size:12px;max-width:80%;color:#C4B5FD;line-height:1.5}
.qh{font-size:10px;color:#4B5563;margin-top:3px;font-style:italic}
.qdots{display:flex;gap:4px;margin-bottom:14px}
.qdot{width:17px;height:3px;border-radius:2px;transition:background .3s}
.qib{background:#111827;border:1px solid #374151;border-radius:10px;overflow:hidden;margin-top:10px}
.qib textarea,.qib input{width:100%;background:transparent;border:none;outline:none;color:#F9FAFB;font-size:12px;padding:11px 13px;font-family:inherit;resize:none}
.qib-f{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-top:1px solid #1F2937;background:#0D1117}
.ob{width:100%;background:#0D1117;border:1px solid #1F2937;border-radius:7px;padding:9px 12px;color:#9CA3AF;cursor:pointer;text-align:left;font-size:11px;font-family:inherit;transition:all .15s;margin-bottom:4px}
.ob:hover{border-color:#7C3AED;color:#F9FAFB;background:#1C1535}
.skip{background:none;border:none;color:#4B5563;cursor:pointer;font-size:10px;margin-top:5px;text-decoration:underline;font-family:inherit}

/* ── UPLOAD AREA ── */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:7px;margin-bottom:12px}
.slot{border:1px dashed #1F2937;border-radius:10px;padding:11px;text-align:center;cursor:pointer;transition:all .2s;position:relative;min-height:105px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.slot.req{border-color:#7C3AED44}
.slot.filled{border-style:solid;border-color:#16A34A55;background:#06160a}
.slot.dragover-slot{border-color:#7C3AED;background:#1C153533;transform:scale(1.02)}
.slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.slot-emoji{font-size:20px;margin-bottom:4px}
.slot-label{font-size:11px;font-weight:700;color:#F9FAFB;margin-bottom:2px}
.slot-hint{font-size:9px;color:#4B5563;margin-bottom:3px;line-height:1.3}
.slot-badge{font-size:8px;padding:2px 6px;border-radius:12px;font-weight:700}
.slot-badge.req{background:#7C3AED22;color:#A78BFA}
.slot-badge.opt{background:#1F2937;color:#4B5563}
.slot-badge.filled-ok{background:#16A34A22;color:#4ADE80}
.slot-remove{position:absolute;top:4px;right:5px;background:#EF444422;border:none;border-radius:50%;width:16px;height:16px;color:#F87171;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.dropzone{border:2px dashed #374151;border-radius:12px;padding:22px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:12px}
.dropzone:hover,.dropzone.dragover{border-color:#7C3AED;background:#1C153518}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:28px;margin-bottom:6px}
.dz-text{font-size:13px;font-weight:700;color:#F9FAFB;margin-bottom:3px}
.dz-sub{font-size:11px;color:#4B5563}
.dz-types{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:8px}
.dz-badge{font-size:9px;padding:2px 6px;border-radius:10px;background:#1F2937;color:#6B7280;font-weight:600}
.file-item{background:#111827;border:1px solid #1F2937;border-radius:7px;padding:9px 11px;display:flex;align-items:center;gap:9px;margin-bottom:5px}
.file-thumb{width:38px;height:38px;border-radius:5px;object-fit:cover;flex-shrink:0}
.file-thumb-icon{width:38px;height:38px;border-radius:5px;background:#1F2937;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.file-name{font-size:11px;font-weight:700;color:#F9FAFB;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:9px;color:#4B5563;margin-top:1px}
.file-remove{background:none;border:none;color:#4B5563;cursor:pointer;font-size:15px;padding:2px 5px;border-radius:4px;margin-left:auto;flex-shrink:0}
.file-remove:hover{color:#F87171;background:#EF444415}

/* ── SEND BUTTON ── */
.send-zone{background:linear-gradient(135deg,#1C1535,#0D1117);border:1px solid #7C3AED44;border-radius:12px;padding:16px 18px;margin-top:16px}
.send-btn{width:100%;background:linear-gradient(135deg,#7C3AED,#2563EB);border:none;border-radius:10px;padding:13px;color:#fff;cursor:pointer;font-size:14px;font-weight:800;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 24px #7C3AED44}
.send-ready{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:10px;color:#4B5563;flex-wrap:wrap}
.sc{display:flex;align-items:center;gap:3px}
.sc.ok{color:#4ADE80}
.sc.warn{color:#FCD34D}

/* ── SEND MODAL ── */
.modal-wrap{position:fixed;inset:0;background:#000000bb;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#0D1117;border:1px solid #374151;border-radius:14px;max-width:580px;width:100%;max-height:88vh;overflow:auto}
.modal-hdr{padding:14px 18px;border-bottom:1px solid #1F2937;display:flex;justify-content:space-between;align-items:center}
.modal-hdr h3{font-size:15px;font-weight:800}
.modal-close{background:none;border:none;color:#4B5563;cursor:pointer;font-size:20px;font-family:inherit}
.modal-body{padding:18px}
.ch-card{background:#111827;border:1px solid #1F2937;border-radius:10px;padding:13px;margin-bottom:9px}
.ch-hdr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.ch-icon{font-size:18px}
.ch-name{font-size:13px;font-weight:700;flex:1}
.ch-desc{font-size:10px;color:#4B5563;margin-top:1px}
.msg-preview{background:#07090F;border:1px solid #1F2937;border-radius:7px;padding:10px 12px;font-family:'Courier New',monospace;font-size:10px;color:#94A3B8;white-space:pre-wrap;word-break:break-word;max-height:160px;overflow:auto;margin-bottom:7px;line-height:1.6}

/* ── OUTPUT TABS ── */
.tab-bar{background:#111827;border:1px solid #1F2937;border-radius:9px;padding:3px;display:inline-flex;gap:2px;margin-bottom:13px}
.tab{background:transparent;border:none;border-radius:7px;padding:6px 13px;color:#4B5563;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.tab.on{background:#7C3AED;color:#fff;font-weight:700}
.cbox{border:1px solid #1F2937;border-radius:10px;overflow:hidden}
.chdr{padding:8px 13px;border-bottom:1px solid #1F2937;display:flex;justify-content:space-between;align-items:center;background:#0D1117}
.clbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4B5563}
.cbtn{background:#7C3AED;border:none;border-radius:6px;padding:5px 12px;color:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;transition:background .2s}
.cbtn.ok{background:#16A34A}
.cbody{padding:12px;font-family:'Courier New',monospace;font-size:10px;color:#94A3B8;overflow:auto;max-height:340px;line-height:1.7;white-space:pre-wrap;word-break:break-word;background:#07090F}
.brief-card{background:#0D1117;border:1px solid #7C3AED44;border-radius:10px;overflow:hidden;margin-bottom:12px}
.brief-hdr{background:#7C3AED18;padding:8px 13px;border-bottom:1px solid #7C3AED33;display:flex;justify-content:space-between;align-items:center}
.brief-hdr span{font-size:10px;font-weight:700;color:#A78BFA;letter-spacing:.5px}
.brief-body{padding:12px 13px;display:flex;flex-direction:column;gap:6px}
.brief-row{display:flex;align-items:flex-start;gap:8px;font-size:12px}
.brief-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.brief-val{color:#E2E8F0;line-height:1.4}
.brief-meta{font-size:9px;color:#4B5563}

/* ── MISC ── */
.divider{height:1px;background:#1F2937;margin:14px 0}
.section-title{font-size:10px;font-weight:700;color:#9CA3AF;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.auto-row{background:#111827;border:1px solid #1F2937;border-radius:7px;padding:8px 12px;margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap}
.auto-item{display:flex;gap:5px;align-items:center;font-size:11px}
.auto-item .lbl{color:#4B5563}
.auto-item .val{color:#9CA3AF;font-weight:600}
.btn-p{background:#7C3AED;border:none;border-radius:7px;padding:7px 15px;color:#fff;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:background .2s}
.btn-p:hover{background:#6D28D9}
.btn-g{background:transparent;border:1px solid #374151;border-radius:7px;padding:7px 15px;color:#9CA3AF;cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
.btn-g:hover{border-color:#7C3AED;color:#F9FAFB}
.info-box{background:#1E3A5F15;border:1px solid #1E3A5F;border-radius:7px;padding:9px 12px;display:flex;gap:7px;margin-top:9px;font-size:11px;color:#93C5FD;line-height:1.6}

/* ── REQUIRED LABEL ── */
.req-label{font-size:9px;color:#A78BFA;font-weight:700;margin-left:5px;vertical-align:middle}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px}
.section-status.ok{background:#16A34A22;color:#4ADE80}
.section-status.miss{background:#EAB30822;color:#FCD34D;animation:blink 1.5s infinite}
</style>
</head>
<body>

<!-- Send Modal -->
<div id="sendModal" class="modal-wrap" style="display:none">
  <div class="modal">
    <div class="modal-hdr"><h3>📨 Gửi cho IT Team</h3><button class="modal-close" onclick="closeSendModal()">×</button></div>
    <div class="modal-body" id="sendModalBody"></div>
  </div>
</div>

<div id="app"></div>

<script>
// ── ENV ──────────────────────────────────────────────────────────────────────
const ENV=(()=>{
  const ua=navigator.userAgent;
  let b='Unknown',o='Unknown';
  if(/Chrome\//.test(ua)&&!/Edg\//.test(ua))b='Chrome';
  else if(/Firefox\//.test(ua))b='Firefox';
  else if(/Safari\//.test(ua)&&!/Chrome\//.test(ua))b='Safari';
  else if(/Edg\//.test(ua))b='Edge';
  if(/Windows/.test(ua))o='Windows';

  else if(/iPhone|iPad/.test(ua))o='iOS';
  else if(/Android/.test(ua))o='Android';
  else if(/Linux/.test(ua))o='Linux';
  return{browser:b,os:o,screen:`${screen.width}×${screen.height}`};
})();

      {id:'files',label:`Upload ít nhất 1 file`,ok:totalFileCount()>0,req:true,targetId:'uploadSection'},
      {id:'reqslots',label:'Điền đủ các slot file bắt buộc',ok:requiredSlotsFilled(),req:false,targetId:'uploadSection'},
    ],
  };
  return gates[step]||[];
}
function canProceed(step){
  return getGate(step).filter(g=>g.req).every(g=>g.ok);
}
function missingCount(step){
  return getGate(step).filter(g=>g.req&&!g.ok).length;
}

// ── SCORE ─────────────────────────────────────────────────────────────────────
function calcScore(){
  let s=0;
  if(S.team)s+=8;if(S.req)s+=8;if(S.severity)s+=12;if(S.archComp)s+=8;if(S.reproduced)s+=5;
  const isBug=S.req&&!S.req.includes('feature');
  if(isBug){if(S.expectedBehavior.trim().length>5)s+=9;if(S.actualBehavior.trim().length>5)s+=9;}else s+=18;
  const qs=getQs();
  const ans=qs.filter(q=>S.answers[q.id]&&S.answers[q.id]!=='(bỏ qua)').length;
  s+=Math.round((ans/Math.max(qs.length,1))*18);
  const slots=getSlots();
  const filled=slots.filter(sl=>!!S.slotFiles[sl.id]).length;
  s+=Math.round((filled/Math.max(slots.length,1))*15);
  if(totalFileCount()>0)s=Math.max(s,30);
  if(S.step>=5)s=Math.max(s,50);
  return Math.min(s,100);
}
function scoreColor(s){return s>=85?'#16A34A':s>=60?'#EAB308':'#EF4444';}
function scoreLabel(s){return s>=85?'Đủ để IT fix ngay ✓':s>=60?'Gần đủ':'Cần thêm thông tin';}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getTeamObj(){return TEAMS.find(x=>x.id===S.team);}
function getReqObj(){return(RT[S.team]||[]).find(x=>x.id===S.req);}
function getQs(){return QS[S.req]||defaultQS;}
function getSevObj(){return SEVS.find(x=>x.id===S.severity);}
function getArchObj(){return ARCH.find(x=>x.id===S.archComp);}
function getSlots(){return FILE_SLOTS[S.req]||defaultSlots;}
function isBugType(){return S.req&&!S.req.includes('feature');}
function totalFileCount(){return Object.keys(S.slotFiles).length+S.extraFiles.length;}
function requiredSlotsFilled(){return getSlots().filter(s=>s.req).every(s=>!!S.slotFiles[s.id]);}
function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function fileIcon(n){const e=(n.split('.').pop()||'').toLowerCase();if(['jpg','jpeg','png','gif','webp'].includes(e))return'🖼️';if(['mp4','mov','avi','webm'].includes(e))return'🎬';if(['pdf'].includes(e))return'📕';if(['docx','doc'].includes(e))return'📝';if(['xlsx','xls','csv'].includes(e))return'📊';if(['zip','rar'].includes(e))return'🗜️';if(['txt','md','log'].includes(e))return'📄';if(['har','json'].includes(e))return'💾';return'📎';}
function isImage(t){return t&&t.startsWith('image/');}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function readFile(file,cb){const r=new FileReader();r.onload=e=>cb({name:file.name,type:file.type,size:file.size,dataUrl:e.target.result});r.readAsDataURL(file);}
function handleSlotDrop(slotId,files){if(!files?.length)return;readFile(files[0],data=>{S.slotFiles[slotId]=data;renderUpload();updateScore();});}
function handleExtraFiles(files){Array.from(files).forEach(f=>readFile(f,data=>{S.extraFiles.push(data);renderUpload();updateScore();}));}
function removeSlotFile(slotId){delete S.slotFiles[slotId];renderUpload();updateScore();}
function removeExtraFile(i){S.extraFiles.splice(i,1);renderUpload();updateScore();}

function scrollToMissing(step){

}

// ── GATE PANEL ────────────────────────────────────────────────────────────────
function renderGatePanel(step,nextStep,nextLabel,backStep){
  const gates=getGate(step);
  const ready=canProceed(step);
  const missing=missingCount(step);
  const gateItems=gates.map(g=>{
    const cls2=g.ok?'ok':g.req?'missing':'optional';
    const oc=(!g.ok&&g.req&&g.targetId)?'onclick="document.getElementById(\''+g.targetId+'\')?.scrollIntoView({behavior:\'smooth\',block:\'center\'})"':'';
    const dot=g.ok?'✓':g.req?'!':'○';
    const arrow=(!g.ok&&g.req)?'<span style="font-size:9px;color:#EAB308;margin-left:auto">← click để đến đây</span>':'';
    return`<div class="gate-item ${cls2}" ${oc}><div class="gate-dot">${dot}</div><span>${g.label}</span>${arrow}</div>`;
  }).join('');
  const btnText=ready?(nextLabel+' →'):('Cần '+missing+' mục nữa để tiếp tục');
  return`<div class="gate-panel">
    <div class="gate-inner">
      <div class="gate-title">Checklist bước ${step}</div>
      <div class="gate-list">${gateItems}</div>
      <div class="gate-btn-row">
        ${backStep?('<button class="gate-back" onclick="goStep('+backStep+')">← Quay lại</button>'):''}
        <button class="gate-btn ${ready?'ready':'blocked'}" onclick="${ready?'goStep('+nextStep+')':'scrollToMissing('+step+')'}">
          ${!ready?('<span class="missing-count">'+missing+'</span>'):''}
          ${btnText}
        </button>
      </div>
    </div>
  </div>`;
}

        +'<div><div class="hdr-t">NQuoc · IT Request</div><div class="hdr-s">Yêu cầu đã gửi thành công</div></div>'
      +'</div>'
      +'<div style="max-width:500px;margin:0 auto;padding:32px 20px">'
        +'<div style="text-align:center;margin-bottom:28px">'
          +'<div style="font-size:64px;margin-bottom:12px">✅</div>'
          +'<h2 style="font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px">Đã gửi cho IT Team!</h2>'
          +'<p style="font-size:13px;color:#9CA3AF;line-height:1.65">Yêu cầu đã được ghi nhận.<br>IT team sẽ phản hồi trong vòng <strong style="color:#F9FAFB">'+slaTxt+'</strong>.</p>'
        +'</div>'
        +'<div style="background:#111827;border:1px solid #1F2937;border-radius:12px;padding:16px;margin-bottom:14px">'
          +'<div style="font-size:10px;font-weight:700;color:#4B5563;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Tóm tắt yêu cầu</div>'
          +'<div style="display:flex;flex-direction:column;gap:8px">'
            +'<div style="display:flex;gap:12px;font-size:12px"><span style="color:#4B5563;width:90px;flex-shrink:0">Team</span><span style="color:#F9FAFB;font-weight:600">'+team.e+' '+team.name+'</span></div>'
            +'<div style="display:flex;gap:12px;font-size:12px"><span style="color:#4B5563;width:90px;flex-shrink:0">Loại vấn đề</span><span style="color:#F9FAFB">'+req2.l+'</span></div>'
            +'<div style="display:flex;gap:12px;font-size:12px"><span style="color:#4B5563;width:90px;flex-shrink:0">Mức độ</span><span style="color:#F9FAFB;font-weight:600">'+sev.emoji+' '+sev.id+'</span></div>'
            +'<div style="display:flex;gap:12px;font-size:12px"><span style="color:#4B5563;width:90px;flex-shrink:0">SLA phản hồi</span><span style="color:#F9FAFB">'+slaTxt+'</span></div>'
            +'<div style="display:flex;gap:12px;font-size:12px"><span style="color:#4B5563;width:90px;flex-shrink:0">Files đính kèm</span><span style="color:#F9FAFB">'+fc+' files</span></div>'
            +'<div style="display:flex;gap:12px;font-size:12px"><span style="color:#4B5563;width:90px;flex-shrink:0">Gửi lúc</span><span style="color:#F9FAFB">'+ts+'</span></div>'
          +'</div>'
        +'</div>'
        +'<div style="background:#16A34A0D;border:1px solid #16A34A33;border-radius:10px;padding:12px 16px;margin-bottom:20px">'
          +'<div style="font-size:11px;color:#4ADE80;font-weight:700;margin-bottom:6px">Bước tiếp theo</div>'
          +'<div style="font-size:12px;color:#9CA3AF;line-height:1.75">'
            +'• IT Leader sẽ confirm nhận ticket qua Telegram<br>'
            +'• Nếu cần thêm thông tin, IT sẽ nhắn trực tiếp cho bạn<br>'
            +'• Khi fix xong, IT báo lại và yêu cầu bạn test verify<br>'
            +'• Phản hồi trong <strong style="color:#F9FAFB">'+slaTxt+'</strong>'
          +'</div>'
        +'</div>'
        +'<div style="display:flex;flex-direction:column;gap:8px">'
          +'<button class="btn-p" onclick="goStep(5);S.tab=0;render()" style="width:100%;padding:11px;font-size:13px">✏️ Chỉnh sửa / xem lại yêu cầu</button>'
          +'<button onclick="showDeleteConfirm()" style="width:100%;background:transparent;border:1px solid #EF444433;border-radius:7px;padding:10px;color:#F87171;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s">🗑️ Xoá yêu cầu (vấn đề đã tự giải quyết)</button>'
          +'<button class="btn-g" onclick="reset()" style="width:100%;padding:10px;font-size:13px">+ Gửi yêu cầu mới</button>'
        +'</div>'
      +'</div>';
    return;
  }


  let h=`<div class="hdr">
    <div class="logo">🔧</div>
    <div><div class="hdr-t">NQuoc · IT Request v4</div><div class="hdr-s">Checklist-gated · Timeline · 95% complete</div></div>
  </div>
  <div class="sbar">
    <div class="sbar-row">
      <div class="sbar-bg"><div class="sbar-fill" style="width:${score}%;background:${scoreColor(score)}"></div></div>
      <div class="sbar-pct" style="color:${scoreColor(score)}">${score}%</div>
      <div class="sbar-lbl">${scoreLabel(score)}</div>
    </div>
  </div>
  ${renderTimeline()}
  <div class="main"><div class="step-content">`;

  // ── STEP 1: TEAM ──
  if(S.step===1){
    h+=`<div class="tag">Trạm 1 / 5</div>
    <h2>Bạn đang ở team nào?</h2>
    <p class="sub">Mỗi team có backend riêng. Chọn đúng → IT debug đúng chỗ ngay.</p>
    <div class="tgrid" id="teamGrid">${TEAMS.map(t=>`<div class="tc" onclick="selTeam('${t.id}')"><div class="tc-e">${t.e}</div><div class="tc-n">${t.name}</div><div class="tc-d">${t.desc}</div></div>`).join('')}</div>
    ${renderGatePanel(1,2,'Chọn loại yêu cầu',null)}`;
  }

  // ── STEP 2: REQUEST TYPE ──
  else if(S.step===2){
    h+=`<div class="tag">Trạm 2 / 5</div>
    <h2>${team?.e} Team ${team?.name}</h2>
    <p class="sub">Chọn loại vấn đề để nhận bộ câu hỏi và file slot phù hợp.</p>
    <div class="rl" id="reqList">${(RT[S.team]||[]).map(r=>`<div class="rc" onclick="selReq('${r.id}')"><div style="font-size:18px;width:24px;text-align:center;flex-shrink:0">${r.i}</div><div><div style="font-size:13px;font-weight:700">${r.l}</div><div style="font-size:10px;color:#4B5563;margin-top:2px">${r.d}</div></div><span style="color:#374151;margin-left:auto">→</span></div>`).join('')}</div>
    ${renderGatePanel(2,3,'Chọn severity & context',1)}`;
  }

  // ── STEP 3: CONTEXT ──
  else if(S.step===3){
    const sevMissing=!S.severity,archMissing=!S.archComp,expMissing=isBug&&S.expectedBehavior.trim().length<=5,actMissing=isBug&&S.actualBehavior.trim().length<=5;
    h+=`<div class="tag">Trạm 3 / 5 — Context cho IT</div>
    <h2>Severity · Component · Expected/Actual</h2>
    <p class="sub">3 thứ này giúp IT biết ngay: fix bao lâu, fix ở đâu, test xong là đúng chưa. <strong style="color:#A78BFA">Tất cả là bắt buộc.</strong></p>

    <div class="section-hdr"><div class="section-title">1 · Mức độ ưu tiên <span class="req-label">★ bắt buộc</span></div><span class="section-status ${S.severity?'ok':'miss'}">${S.severity?'✓ '+S.severity:'⚠ Chưa chọn'}</span></div>
    <div class="sev-grid" id="sevGrid">${SEVS.map(sv=>`<div class="sev-card ${sv.cls} ${S.severity===sv.id?'sel':''} ${sevMissing?'req-missing':''}" onclick="S.severity='${sv.id}';render()"><div class="sev-lbl">${sv.emoji} ${sv.label}</div><div class="sev-desc">${sv.desc}</div><span class="sev-sla">${sv.sla}</span></div>`).join('')}</div>

    <div class="divider"></div>
    <div class="section-hdr"><div class="section-title">2 · Component bị ảnh hưởng <span class="req-label">★ bắt buộc</span></div><span class="section-status ${S.archComp?'ok':'miss'}">${S.archComp?(getArchObj()?.name||'✓'):'⚠ Chưa chọn'}</span></div>
    <div class="arch-grid" id="archGrid">${ARCH.map(a=>`<button class="arch-btn ${S.archComp===a.id?'sel':''} ${archMissing?'req-missing':''}" onclick="S.archComp='${a.id}';updateScore();document.querySelectorAll('.arch-btn').forEach(b=>b.classList.remove('req-missing'))"><div class="arch-icon">${a.icon}</div><div class="arch-name">${a.name}</div><div class="arch-desc">${a.desc}</div></button>`).join('')}</div>

    ${isBug?`<div class="divider"></div>
    <div class="section-hdr"><div class="section-title">3 · Expected vs Actual <span class="req-label">★ bắt buộc cho bug</span></div><span class="section-status ${!expMissing&&!actMissing?'ok':'miss'}">${!expMissing&&!actMissing?'✓ Đã điền':'⚠ Cần cả 2 ô'}</span></div>
    <div class="ea-grid">
      <div class="ea-box ${expMissing?'req-missing':''}"><div class="ea-hdr exp">✅ EXPECTED — Đáng lẽ phải thế này</div>
      <textarea id="ea_exp" placeholder="VD: Click Save → hiện 'Đã lưu thành công'" oninput="S.expectedBehavior=this.value;updateScore()">${escH(S.expectedBehavior)}</textarea></div>
      <div class="ea-box ${actMissing?'req-missing':''}"><div class="ea-hdr act">❌ ACTUAL — Thực tế đang xảy ra</div>
      <textarea id="ea_act" placeholder="VD: Click Save → trang trắng, không có gì" oninput="S.actualBehavior=this.value;updateScore()">${escH(S.actualBehavior)}</textarea></div>
    </div>
    <div class="divider"></div>
    <div class="section-title">4 · Reproducibility <span style="color:#4B5563;font-size:9px">(không bắt buộc)</span></div>
    <div class="repro-row" id="reproRow">${REPRODUCTIONS.map(r=>{const sc=S.reproduced===r?'sel':'';return`<button class="repro-btn ${sc}" onclick="S.reproduced='${escA(r)}';render()">${r}</button>`;}).join('')}</div>`:''}

    <div class="divider"></div>
    <div class="section-title">🤖 Environment (auto-detected)</div>
    <div class="auto-row"><div class="auto-item"><span class="lbl">Browser:</span><span class="val">${ENV.browser}</span></div><div class="auto-item"><span class="lbl">OS:</span><span class="val">${ENV.os}</span></div><div class="auto-item"><span class="lbl">Screen:</span><span class="val">${ENV.screen}</span></div></div>

    ${renderGatePanel(3,4,'Bắt đầu phỏng vấn chi tiết',2)}`;
  }

  // ── STEP 4: INTERVIEW ──
  else if(S.step===4){
    let chat='';
    for(let i=0;i<S.qi;i++){const q=qs[i];chat+=`<div class="chat-bot"><div class="av">IT</div><div class="bb">${escH(q.q)}</div></div><div class="chat-usr"><div class="bu">${escH(S.answers[q.id]||'(bỏ qua)')}</div></div>`;}
    const dots=qs.map((_,i)=>`<div class="qdot" style="background:${i<S.qi?'#16A34A':i===S.qi?'#7C3AED':'#1F2937'}"></div>`).join('');
    let inp='';
    if(cq.t==='sel'){inp=cq.o.map(o=>`<button class="ob" onclick="submitAns('${escA(o)}')">${escH(o)}</button>`).join('');}
    else{const ta=cq.t==='area';const fldHtml=ta?'<textarea id="di" rows="3" placeholder="Nhap cau tra loi..." onkeydown="handleKey(event)"></textarea>':'<input id="di" type="text" placeholder="Nhap cau tra loi..." onkeydown="handleKey(event)">';const nextLbl=S.qi<qs.length-1?'Tiep →':'Hoan thanh ✓';inp=`<div class="qib">${fldHtml}<div class="qib-f"><span style="font-size:10px;color:#4B5563">Ctrl+Enter de gui</span><button class="btn-p" style="font-size:11px;padding:5px 12px" onclick="submitFromInput()">${nextLbl}</button></div></div>`;}
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px">
      <div class="tag" style="margin:0">Trạm 4 / 5 · Câu ${S.qi+1} / ${qs.length}</div>
      <div class="qdots">${dots}</div>
    </div>
    ${chat}
    <div class="chat-bot"><div class="av">IT</div><div class="bb on"><div style="font-weight:700;font-size:13px">${escH(cq.q)}</div>${cq.h?`<div class="qh">${escH(cq.h)}</div>`:''}</div></div>
    ${inp}
    <button class="skip" onclick="skipQ()">Bỏ qua câu này</button>
    ${renderGatePanel(4,5,'Đến Upload & Gửi IT',3)}`;
  }

  // ── STEP 5: OUTPUT ──
  else if(S.step===5){
    h+=`<div style="display:flex;align-items:center;gap:9px;margin-bottom:6px">
      <div style="width:33px;height:33px;border-radius:50%;background:#16A34A22;display:flex;align-items:center;justify-content:center;font-size:16px">✅</div>
      <div><h2 style="margin-bottom:1px">Trạm cuối — ${score}% complete</h2>
      <div style="font-size:10px;color:#4B5563">${team?.e} ${team?.name} · ${req?.l} · ${sev?.id||''} · ${arch?.name||''}</div></div>
    </div>
    <p class="sub">Upload file → Copy brief → Gửi IT. Ba bước, không thiếu gì.</p>
    <div class="tab-bar">
      <button class="tab ${S.tab===0?'on':''}" onclick="setTab(0)">📁 Upload & Gửi</button>
      <button class="tab ${S.tab===1?'on':''}" onclick="setTab(1)">⚡ IT Brief</button>
      <button class="tab ${S.tab===2?'on':''}" onclick="setTab(2)">📋 Claude Prompt</button>
    </div>
    <div id="uploadTabContent"></div>`;

    if(S.tab===1){
      const briefText=buildBriefText();
      h+=`<div class="brief-card">
        <div class="brief-hdr"><span>⚡ IT QUICK BRIEF — đọc 10 giây</span>
        <button class="cbtn ${S.briefCopied?'ok':''}" onclick="doBriefCopy()" style="font-size:10px;padding:3px 10px">${S.briefCopied?'✓ Copied!':'Copy'}</button></div>
        <div class="brief-body">
          <div class="brief-row"><div class="brief-icon">${sev?.emoji||'🟡'}</div><div><div class="brief-val">${sev?.id} — ${sev?.label?.split('—')[1]?.trim()||''}</div><div class="brief-meta">SLA: ${sev?.sla}</div></div></div>
          <div class="brief-row"><div class="brief-icon">👥</div><div><div class="brief-val">Team ${team?.name} · ${req?.l}</div></div></div>
          <div class="brief-row"><div class="brief-icon">📍</div><div><div class="brief-val">${arch?.name}</div><div class="brief-meta">${arch?.desc||''}</div></div></div>
          ${isBugType()&&S.expectedBehavior?`<div class="brief-row"><div class="brief-icon">✅</div><div><div class="brief-val">${escH(S.expectedBehavior.substring(0,90))}</div><div class="brief-meta">Expected</div></div></div>`:``}
          ${isBugType()&&S.actualBehavior?`<div class="brief-row"><div class="brief-icon">❌</div><div><div class="brief-val">${escH(S.actualBehavior.substring(0,90))}</div><div class="brief-meta">Actual</div></div></div>`:``}
          <div class="brief-row"><div class="brief-icon">📎</div><div><div class="brief-val" style="color:${totalFileCount()>0?'#4ADE80':'#F87171'}">${totalFileCount()>0?totalFileCount()+' files':'Chưa có file'}</div></div></div>
          <div class="brief-row"><div class="brief-icon">✅</div><div><div class="brief-val" style="color:${scoreColor(score)}">${score}% complete</div></div></div>
        </div>
      </div>`;
    } else if(S.tab===2){
      const prompt=buildPrompt();
      h+=`<div class="cbox"><div class="chdr"><span class="clbl">Prompt → Claude.ai</span><button class="cbtn ${S.copied?'ok':''}" onclick="doCopy()">${S.copied?'✓ Đã copy!':'📋 Copy'}</button></div><div class="cbody">${escH(prompt)}</div></div>
      <div class="info-box"><span style="font-size:14px;flex-shrink:0">💡</span><div>Copy toàn bộ → mở <strong>claude.ai</strong> → paste → gửi. Claude viết User Story + checklist + code suggestion cho IT.</div></div>`;
    }
    h+=`<div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:18px">
      <button class="btn-p" onclick="reset()">+ Yêu cầu mới</button>
      <button class="btn-g" onclick="goStep(4);S.qi=0;S.answers={};render()">↩ Phỏng vấn lại</button>
      <button class="btn-g" onclick="goStep(3)">↩ Đổi severity</button>
    </div>`;
  }

  h+='</div></div>';
  document.getElementById('app').innerHTML=h;
  if(S.step===5&&S.tab===0)renderUpload();
  if(S.step===4&&(cq.t==='text'||cq.t==='area')){const el=document.getElementById('di');if(el)el.focus();}
  window._currentPrompt=S.step===5?buildPrompt():'';
  window._briefText=S.step===5?buildBriefText():'';
}

// ── ACTIONS ────────────────────────────────────────────────────────────────────
function selTeam(id){S.team=id;S.req=null;S.slotFiles={};render();}
function selReq(id){S.req=id;S.qi=0;S.answers={};S.slotFiles={};render();}
function goStep(n){S.step=n;render();}
function setTab(n){S.tab=n;render();}
function submitAns(v){if(!v?.trim())return;const qs=getQs();S.answers[qs[S.qi].id]=v;if(S.qi<qs.length-1){S.qi++;}else{S.step=5;S.tab=0;}render();}
function submitFromInput(){const el=document.getElementById('di');const v=el?el.value.trim():'';if(v)submitAns(v);}
function handleKey(e){if(e.key==='Enter'&&(e.ctrlKey||e.metaKey||(e.target.tagName!=='TEXTAREA'))){e.preventDefault();submitFromInput();}}
function skipQ(){submitAns('(bỏ qua)');}
function doCopy(){const txt=window._currentPrompt||'';(navigator.clipboard?navigator.clipboard.writeText(txt):Promise.resolve(fallbackCopy(txt))).then(()=>{S.copied=true;render();setTimeout(()=>{S.copied=false;render();},3000);});}
function doBriefCopy(){const txt=window._briefText||'';(navigator.clipboard?navigator.clipboard.writeText(txt):Promise.resolve(fallbackCopy(txt))).then(()=>{S.briefCopied=true;render();setTimeout(()=>{S.briefCopied=false;render();},3000);});}
function fallbackCopy(txt){const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}
function showDeleteConfirm(){
  if(confirm('Xác nhận xoá yêu cầu?\n\nChọn OK nếu vấn đề đã tự giải quyết — IT team sẽ không cần xử lý nữa.')){
    alert('Đã xoá yêu cầu thành công.\nNếu vấn đề xuất hiện lại, hãy tạo yêu cầu mới.');
    reset();
  }
}

function reset(){Object.assign(S,{step:1,team:null,req:null,severity:null,archComp:null,reproduced:null,expectedBehavior:'',actualBehavior:'',qi:0,answers:{},tab:0,copied:false,briefCopied:false,slotFiles:{},extraFiles:[]});render();}

render();
</script>
</body>
</html>
